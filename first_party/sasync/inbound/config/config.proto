syntax = "proto3";

package com.jackbradshaw.sasync.inbound.config;

import "first_party/universal/count/count.proto";
import "first_party/universal/frequency/frequency.proto";

option java_multiple_files = true;
option java_outer_classname = "ConfigProto";
option java_package = "com.jackbradshaw.sasync.inbound.config";

// Configuration for InboundTransportImpl
message Config {
  // The rate to use when polling the underlying stream for new data.
  com.jackbradshaw.universal.frequency.Frequency refresh_rate = 1;

  // The size of the buffer to store data in when polling the underlying stream.
  com.jackbradshaw.universal.count.Count.Bounded buffer_size = 2;
}
